name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -trimpath -o /tmp/proxypool-test ./cmd/proxypool

      - name: Test
        run: go test ./... -v -count=1
        continue-on-error: true  # e2e tests may need echo servers
